<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0818"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Wispora"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <title>Wispora</title>
  <style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:        #0a0818;
  --bg2:       #100e22;
  --s0:        #161329;
  --s1:        #1d1a34;
  --s2:        #252240;
  --s3:        #2e2a50;
  --b0: rgba(160,140,255,0.07);
  --b1: rgba(160,140,255,0.13);
  --b2: rgba(160,140,255,0.22);
  --t0: #edeaff;
  --t1: #b8b2dc;
  --t2: #6b668f;
  --p:  #9d7ff5;
  --ps: rgba(157,127,245,0.14);
  --p2: rgba(157,127,245,0.25);
  --teal:   #52c9a8;
  --blue:   #6fb4f0;
  --amber:  #f0b660;
  --red:    #f07070;
  --red-s:  rgba(240,112,112,0.12);
  --ease: cubic-bezier(.22,.68,0,1.2);
  --ease-out: cubic-bezier(0,0,.3,1);
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r999:999px;
  --nav:68px;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono','Courier New',monospace;
}

html,body{height:100%;background:var(--bg);color:var(--t0);font-family:var(--font);font-size:14px;line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased;}

.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ambient::before{content:'';position:absolute;width:600px;height:600px;top:-120px;left:-80px;border-radius:50%;background:radial-gradient(circle,rgba(100,60,220,0.12) 0%,transparent 70%);}
.ambient::after{content:'';position:absolute;width:500px;height:500px;bottom:-100px;right:-60px;border-radius:50%;background:radial-gradient(circle,rgba(70,160,200,0.08) 0%,transparent 70%);}

.app{display:flex;flex-direction:row;height:100%;position:relative;z-index:1;}

/* ── SIDEBAR ── */
.nav{width:var(--nav);flex-shrink:0;background:rgba(10,8,24,0.9);backdrop-filter:blur(20px);border-right:1px solid var(--b0);display:flex;flex-direction:column;align-items:center;padding:14px 0 14px;gap:4px;z-index:100;}
.nav-brand{width:36px;height:36px;border-radius:var(--r12);background:linear-gradient(135deg,#7c5af5,#9d7ff5);display:flex;align-items:center;justify-content:center;margin-bottom:16px;flex-shrink:0;box-shadow:0 4px 16px rgba(124,90,245,0.35);}
.nav-brand svg{width:18px;height:18px;color:#fff;}
.nav-btn{width:48px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--t2);transition:color .18s var(--ease-out),background .18s var(--ease-out);font-size:8px;letter-spacing:.4px;text-transform:uppercase;font-family:var(--font);font-weight:600;border-radius:var(--r12);position:relative;}
.nav-btn svg{width:18px;height:18px;transition:transform .2s var(--ease);}
.nav-btn:hover{color:var(--t1);background:var(--s2);}
.nav-btn.active{color:var(--p);background:var(--ps);}
.nav-btn.active svg{transform:scale(1.08);}
.nav-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;border-radius:0 var(--r4) var(--r4) 0;background:var(--p);}

.tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
.panel{display:none;flex:1;min-height:0;}
.panel.active{display:flex;flex-direction:column;}

/* ══════════════════════════════════
   FOCUS PANEL — REDESIGNED
══════════════════════════════════ */
#panel-focus.active {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 0;
  overflow: hidden;
}

/* LEFT: Timer centered */
.focus-timer-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 32px;
  position: relative;
  overflow: hidden;
}

/* particle canvas behind timer */
#particleCanvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.timer-center-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* ring */
.timer-ring-wrap {
  position: relative;
  width: 280px;
  height: 280px;
  cursor: pointer;
  flex-shrink: 0;
}
.timer-ring-wrap svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.ring-track { fill: none; stroke: var(--s2); stroke-width: 5; }
.ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke .5s ease; }
.ring-fill.focus  { stroke: var(--p); filter: drop-shadow(0 0 6px rgba(157,127,245,0.4)); }
.ring-fill.break  { stroke: var(--teal); filter: drop-shadow(0 0 6px rgba(82,201,168,0.4)); }
.ring-fill.urgent { stroke: var(--red);  filter: drop-shadow(0 0 6px rgba(240,112,112,0.4)); }

/* tick marks on ring */
.ring-ticks { position: absolute; inset: 0; }

.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  pointer-events: none;
}
.timer-time {
  font-family: var(--mono);
  font-size: 60px;
  font-weight: 500;
  letter-spacing: -2px;
  line-height: 1;
  transition: color .4s;
  font-variant-numeric: tabular-nums;
}
.timer-time.urgent { color: var(--red); }
.timer-phase-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--t2);
  font-weight: 600;
}
.timer-badge {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--teal);
  opacity: 0;
  transition: opacity .4s;
  font-weight: 700;
}
.timer-badge.show { opacity: 1; }

/* session pill */
.session-pill {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--s1);
  border: 1px solid var(--b2);
  border-radius: var(--r999);
  padding: 6px 14px 6px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--t1);
  max-width: 260px;
}
.session-pill.visible { display: flex; }
.session-pill-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--p);
  animation: pulse-dot 1.6s ease-in-out infinite;
  flex-shrink: 0;
}
.session-pill-dot.bug { background: var(--amber); animation: none; }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(.7);} }
.session-pill-desc {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 200px;
}

/* break hint */
.break-hint {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--teal);
  opacity: 0;
  transition: opacity .4s;
  font-weight: 600;
  min-height: 14px;
}
.break-hint.show { opacity: 1; }

/* controls */
.timer-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.t-btn {
  background: none; border: none; cursor: pointer; color: var(--t2);
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: var(--r12);
  transition: color .15s, background .15s;
}
.t-btn:hover { color: var(--t1); background: var(--s2); }
.t-btn-play {
  width: 68px; height: 68px; border-radius: 50%;
  background: var(--s1); border: 1.5px solid var(--b2);
  color: var(--t0);
  transition: background .18s, border-color .18s, transform .12s var(--ease), box-shadow .18s;
}
.t-btn-play:hover { background: var(--s2); border-color: var(--p); box-shadow: 0 0 24px rgba(157,127,245,0.3); }
.t-btn-play:active { transform: scale(.94); }

/* RIGHT: Stats + Bit/Bug */
.focus-side-col {
  background: var(--s0);
  border-left: 1px solid var(--b0);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.side-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--b0);
  flex-shrink: 0;
}
.side-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--t2);
  letter-spacing: .8px;
  text-transform: uppercase;
}

.side-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.side-scroll::-webkit-scrollbar { width: 2px; }
.side-scroll::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

/* session stat row */
.stat-trio {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}
.mini-stat {
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: var(--r12);
  padding: 10px 8px;
  text-align: center;
}
.mini-stat-val {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.mini-stat-lbl {
  font-size: 8px;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--t2);
  margin-top: 4px;
  font-weight: 600;
}

/* Bit / Bug score cards */
.score-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.score-card {
  border-radius: var(--r12);
  padding: 14px 14px 12px;
  position: relative;
  overflow: hidden;
}
.score-card.bit-card {
  background: rgba(157,127,245,0.08);
  border: 1px solid rgba(157,127,245,0.22);
}
.score-card.bug-card {
  background: rgba(240,182,96,0.07);
  border: 1px solid rgba(240,182,96,0.18);
}
.score-icon {
  font-size: 22px;
  line-height: 1;
  margin-bottom: 6px;
}
.score-num {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 500;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.score-card.bit-card .score-num { color: var(--p); }
.score-card.bug-card .score-num { color: var(--amber); }
.score-lbl {
  font-size: 9px;
  letter-spacing: .8px;
  text-transform: uppercase;
  font-weight: 700;
  margin-top: 2px;
}
.score-card.bit-card .score-lbl { color: rgba(157,127,245,0.6); }
.score-card.bug-card .score-lbl { color: rgba(240,182,96,0.6); }
.score-desc {
  font-size: 10px;
  color: var(--t2);
  margin-top: 5px;
  line-height: 1.4;
}
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: rgba(157,127,245,0.12);
  border: 1px solid rgba(157,127,245,0.2);
  border-radius: var(--r999);
  padding: 2px 7px;
  font-size: 9px;
  font-weight: 700;
  color: var(--p);
  margin-top: 4px;
}

/* Section divider */
.side-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 2px 0;
  user-select: none;
}
.side-section-title {
  font-size: 9px;
  font-weight: 700;
  color: var(--t2);
  letter-spacing: .8px;
  text-transform: uppercase;
}
.side-chevron {
  color: var(--t2);
  transition: transform .22s var(--ease-out);
  display: flex; align-items: center;
}
.side-chevron.open { transform: rotate(90deg); }
.side-collapse {
  overflow: hidden;
  max-height: 0;
  transition: max-height .3s var(--ease-out);
}
.side-collapse.open { max-height: 400px; }
.side-collapse-inner { padding-top: 8px; }

/* Bit ledger bars */
.bit-goal-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.bit-goal-name {
  font-size: 10px;
  font-weight: 600;
  color: var(--t1);
  flex: 0 0 90px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bit-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--s2);
  border-radius: 3px;
  overflow: hidden;
}
.bit-bar {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--p), #c4a8ff);
  transition: width .5s var(--ease-out);
}
.bit-count {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--t2);
  min-width: 18px;
  text-align: right;
}

/* Bug log */
.bug-entry {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--b0);
  font-size: 10px;
}
.bug-entry:last-child { border-bottom: none; }
.bug-entry-desc { font-weight: 600; color: var(--t1); flex: 1; }
.bug-entry-time { color: var(--t2); white-space: nowrap; flex-shrink: 0; }

/* ══════════════════════════════════
   Bit session modal (bottom-sheet style)
══════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(4,2,16,.8);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--s0);
  border: 1px solid var(--b2);
  border-radius: var(--r20);
  padding: 22px 22px 26px;
  width: 100%;
  max-width: 380px;
  transform: scale(.94) translateY(8px);
  transition: transform .25s var(--ease);
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.55);
}
.modal-backdrop.open .modal { transform: scale(1) translateY(0); }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-header .modal-title { margin-bottom: 0; }
.modal-close {
  width: 32px; height: 32px; border-radius: var(--r8);
  background: var(--s2); border: 1px solid var(--b1);
  color: var(--t2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color .12s, background .12s;
}
.modal-close:hover { color: var(--t0); background: var(--s3); }

/* type picker */
.type-picker {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.type-option {
  background: var(--s2);
  border: 1.5px solid var(--b1);
  border-radius: var(--r12);
  padding: 12px;
  cursor: pointer;
  transition: all .18s var(--ease-out);
  text-align: center;
}
.type-option:hover { border-color: var(--b2); background: var(--s3); }
.type-option.selected.bit { border-color: var(--p); background: rgba(157,127,245,0.1); }
.type-option.selected.bug { border-color: var(--amber); background: rgba(240,182,96,0.08); }
.type-option-icon { font-size: 24px; margin-bottom: 4px; }
.type-option-name { font-size: 12px; font-weight: 700; }
.type-option.selected.bit .type-option-name { color: var(--p); }
.type-option.selected.bug .type-option-name { color: var(--amber); }
.type-option-desc { font-size: 9px; color: var(--t2); margin-top: 2px; line-height: 1.4; }

.form-group { margin-bottom: 11px; }
.form-label {
  font-size: 9px; letter-spacing: .8px; text-transform: uppercase;
  color: var(--t2); margin-bottom: 5px; display: block; font-weight: 700;
}
input[type=text], select {
  width: 100%;
  background: var(--s2); border: 1px solid var(--b1);
  border-radius: var(--r8); padding: 9px 12px;
  color: var(--t0); font-size: 13px; font-family: var(--font);
  outline: none; transition: border-color .15s;
}
input:focus, select:focus { border-color: var(--p); }
input::placeholder { color: var(--t2); }
select option { background: var(--s2); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 16px; border-radius: var(--r8); border: none;
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: opacity .15s, transform .12s, box-shadow .15s;
  font-family: var(--font); letter-spacing: .2px;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--p); color: #fff; box-shadow: 0 2px 10px rgba(157,127,245,0.3); }
.btn-primary:hover { opacity: .9; }
.btn-full { width: 100%; }

/* toast */
.toast {
  position: fixed; bottom: 16px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--s1); border: 1px solid var(--b2);
  border-radius: var(--r12); padding: 8px 16px;
  font-size: 11px; font-weight: 600; z-index: 300;
  opacity: 0; transition: opacity .2s, transform .2s var(--ease-out);
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.4); color: var(--t0);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── prefers-reduced-motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
  </style>
</head>
<body>
<div class="ambient"></div>

<div class="app">
<!-- SIDEBAR -->
<nav class="nav">
  <div class="nav-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
  </div>
  <button class="nav-btn active" data-tab="focus">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Focus
  </button>
</nav>

<!-- FOCUS PANEL -->
<div class="tab-content">
<div class="panel active" id="panel-focus">

  <!-- LEFT: Timer -->
  <div class="focus-timer-col">
    <canvas id="particleCanvas"></canvas>

    <div class="timer-center-wrap">
      <!-- ring -->
      <div class="timer-ring-wrap" id="timerRingWrap">
        <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="140" cy="140" r="124"/>
          <!-- tick marks -->
          <g id="ringTicks" opacity="0.25"></g>
          <circle class="ring-fill focus" id="timerRing" cx="140" cy="140" r="124"
            stroke-dasharray="779" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-center">
          <div class="timer-time" id="timerTime">30:00</div>
          <div class="timer-phase-label" id="timerLabel">ready</div>
          <div class="timer-badge" id="timerBadge">break time</div>
        </div>
      </div>

      <!-- active session pill -->
      <div class="session-pill" id="sessionPill">
        <div class="session-pill-dot" id="pillDot"></div>
        <span class="session-pill-desc" id="pillDesc"></span>
      </div>

      <div class="break-hint" id="breakHint">press play to start a 5 min break</div>

      <!-- controls -->
      <div class="timer-controls">
        <button class="t-btn" id="timerReset" aria-label="Reset timer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.14"/></svg>
        </button>
        <button class="t-btn t-btn-play" id="timerPlay" aria-label="Start timer">
          <svg id="tPlayI" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
          <svg id="tPauseI" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
        <button class="t-btn" id="timerSound" aria-label="Toggle sound">
          <svg id="sndOn" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <svg id="sndOff" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Stats + Bit/Bug panel -->
  <div class="focus-side-col">
    <div class="side-header">
      <div class="side-title">Session Stats</div>
    </div>
    <div class="side-scroll">

      <!-- trio stats -->
      <div class="stat-trio">
        <div class="mini-stat">
          <div class="mini-stat-val" id="statSessions">0</div>
          <div class="mini-stat-lbl">Sessions</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val" id="statFocus">0m</div>
          <div class="mini-stat-lbl">Focus</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val" id="statGoals">0</div>
          <div class="mini-stat-lbl">Goals</div>
        </div>
      </div>

      <!-- Bit / Bug cards -->
      <div class="score-grid">
        <div class="score-card bit-card">
          <div class="score-icon">✦</div>
          <div class="score-num" id="statBits">0</div>
          <div class="score-lbl">Bits</div>
          <div class="score-desc">Focused sessions linked to goals</div>
          <div class="streak-badge" id="streakBadge">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            <span id="streakNum">0</span> streak
          </div>
        </div>
        <div class="score-card bug-card">
          <div class="score-icon">⚐</div>
          <div class="score-num" id="statBugs">0</div>
          <div class="score-lbl">Bugs</div>
          <div class="score-desc">Sessions without a goal link</div>
        </div>
      </div>

      <!-- Bits by goal -->
      <div>
        <div class="side-section-header" id="ledgerHdr">
          <span class="side-section-title">Bits by Goal</span>
          <span class="side-chevron open" id="ledgerChev">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        </div>
        <div class="side-collapse open" id="ledgerBody">
          <div class="side-collapse-inner" id="bitLedgerContent"></div>
        </div>
      </div>

      <!-- Bug log -->
      <div>
        <div class="side-section-header" id="bugHdr">
          <span class="side-section-title">Bug Log</span>
          <span class="side-chevron" id="bugChev">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        </div>
        <div class="side-collapse" id="bugBody">
          <div class="side-collapse-inner" id="bugLogContent"></div>
        </div>
      </div>

    </div>
  </div>

</div>
</div>
</div>

<!-- BIT SESSION MODAL -->
<div class="modal-backdrop" id="bitModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Start Focus Session</div>
      <button class="modal-close" id="bitModalClose" aria-label="Close">×</button>
    </div>

    <!-- type picker -->
    <div class="type-picker">
      <div class="type-option selected bit" id="typeBit" role="radio" aria-checked="true" tabindex="0">
        <div class="type-option-icon">✦</div>
        <div class="type-option-name">Bit</div>
        <div class="type-option-desc">Link to a goal, earn a bit</div>
      </div>
      <div class="type-option bug" id="typeBug" role="radio" aria-checked="false" tabindex="0">
        <div class="type-option-icon">⚐</div>
        <div class="type-option-name">Bug</div>
        <div class="type-option-desc">No goal — log as a bug</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="bitTaskDesc">What are you working on?</label>
      <input type="text" id="bitTaskDesc" placeholder="Describe the task…" autocomplete="off"/>
    </div>

    <div class="form-group" id="goalSelectGroup">
      <label class="form-label" for="bitGoalSelect">Link to Goal</label>
      <select id="bitGoalSelect"></select>
    </div>

    <button class="btn btn-primary btn-full" id="bitModalStart" style="margin-top:4px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
      Start Session
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──
const S = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// ── TOAST ──
let _tTimer = null;
function toast(msg, dur = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(() => t.classList.remove('show'), dur);
}

// ── ESCAPE H ──
function escH(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── PARTICLE CANVAS ──
const canvas = document.getElementById('particleCanvas');
const ctx2d = canvas.getContext('2d');
let particles = [];
let animFrame;

function resizeCanvas() {
  const col = canvas.parentElement;
  canvas.width = col.offsetWidth;
  canvas.height = col.offsetHeight;
}

class Particle {
  constructor(active) {
    this.reset(active);
  }
  reset(active) {
    const w = canvas.width, h = canvas.height;
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.baseX = this.x;
    this.baseY = this.y;
    this.size = Math.random() * 1.5 + 0.4;
    this.alpha = Math.random() * 0.4 + (active ? 0.15 : 0.04);
    this.maxAlpha = this.alpha;
    this.vx = (Math.random() - 0.5) * (active ? 0.4 : 0.08);
    this.vy = (Math.random() - 0.5) * (active ? 0.4 : 0.08);
    this.life = Math.random() * 200 + 100;
    this.age = 0;
    this.color = active
      ? (Math.random() > 0.4 ? '157,127,245' : '82,201,168')
      : '140,130,200';
  }
  update(active) {
    this.age++;
    if (this.age > this.life) { this.reset(active); return; }
    this.x += this.vx;
    this.y += this.vy;
    const fade = this.age / this.life;
    this.alpha = this.maxAlpha * Math.sin(Math.PI * fade);
  }
  draw() {
    ctx2d.save();
    ctx2d.globalAlpha = this.alpha;
    ctx2d.fillStyle = `rgb(${this.color})`;
    ctx2d.beginPath();
    ctx2d.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx2d.fill();
    ctx2d.restore();
  }
}

function initParticles(count = 80) {
  particles = [];
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(false));
    // stagger ages so they don't all reset at once
    particles[i].age = Math.floor(Math.random() * particles[i].life);
  }
}

// Connecting lines between close particles
function drawConnections(active) {
  if (!active) return;
  const maxDist = 90;
  ctx2d.save();
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * 0.08;
        ctx2d.globalAlpha = alpha;
        ctx2d.strokeStyle = 'rgba(157,127,245,1)';
        ctx2d.lineWidth = 0.5;
        ctx2d.beginPath();
        ctx2d.moveTo(particles[i].x, particles[i].y);
        ctx2d.lineTo(particles[j].x, particles[j].y);
        ctx2d.stroke();
      }
    }
  }
  ctx2d.restore();
}

let isTimerRunning = false;

function animateParticles() {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  drawConnections(isTimerRunning);
  particles.forEach(p => { p.update(isTimerRunning); p.draw(); });
  animFrame = requestAnimationFrame(animateParticles);
}

// ── TICK MARKS on ring ──
function renderTicks() {
  const g = document.getElementById('ringTicks');
  g.innerHTML = '';
  const cx = 140, cy = 140, r = 124;
  const total = 60; // one per minute of an hour, nice visual density
  for (let i = 0; i < total; i++) {
    const angle = (i / total) * Math.PI * 2 - Math.PI / 2;
    const major = i % 5 === 0;
    const len = major ? 10 : 5;
    const x1 = cx + (r - 2) * Math.cos(angle);
    const y1 = cy + (r - 2) * Math.sin(angle);
    const x2 = cx + (r - 2 - len) * Math.cos(angle);
    const y2 = cy + (r - 2 - len) * Math.sin(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', 'rgba(160,140,255,0.5)');
    line.setAttribute('stroke-width', major ? 1.5 : 0.8);
    line.setAttribute('stroke-linecap', 'round');
    g.appendChild(line);
  }
}

// ── TIMER ──
const FOCUS_T = 30 * 60, BREAK_T = 5 * 60;
const CIRC = 2 * Math.PI * 124; // r=124
let tMode = 'focus', tTotal = FOCUS_T, tRem = FOCUS_T;
let tRun = false, tInt = null, tEpoch = null, tSound = true;
let tSess = S.get('t_sess') || 0;
let tFocM = S.get('t_foc') || 0;
let tGoalsDone = S.get('t_goals') || 0;
let aCtx = null;
let currentBitSession = null;

function fmt(s) {
  return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function getBitStats() {
  const sessions = S.get('bit_sessions') || [];
  const bits = sessions.filter(s => s.isBit);
  const bugs = sessions.filter(s => !s.isBit);
  let streak = 0;
  const sorted = [...sessions].sort((a, b) => b.ts - a.ts);
  for (const s of sorted) { if (s.isBit) streak++; else break; }
  return { bits, bugs, streak };
}

function tRender() {
  document.getElementById('timerTime').textContent = fmt(tRem);
  const ring = document.getElementById('timerRing');
  ring.style.strokeDashoffset = CIRC * (1 - tRem / tTotal);

  const urg = tRem <= 60 && tRem > 0;
  ring.className = 'ring-fill ' + (urg ? 'urgent' : tMode === 'break' ? 'break' : 'focus');
  document.getElementById('timerTime').classList.toggle('urgent', urg);
  document.getElementById('breakHint').classList.toggle('show', tMode === 'break-prompt');
  document.getElementById('timerBadge').classList.toggle('show', tMode === 'break');

  const lbl = tMode === 'break-prompt' ? 'session done' :
              tRem <= 0 ? 'done' :
              tRun ? (tMode === 'break' ? 'break' : 'focus') :
              tRem === tTotal ? 'ready' : 'paused';
  document.getElementById('timerLabel').textContent = lbl;

  // stats
  document.getElementById('statSessions').textContent = tSess;
  document.getElementById('statFocus').textContent = tFocM + 'm';
  document.getElementById('statGoals').textContent = tGoalsDone;

  const bs = getBitStats();
  document.getElementById('statBits').textContent = bs.bits.length;
  document.getElementById('statBugs').textContent = bs.bugs.length;
  document.getElementById('streakNum').textContent = bs.streak;

  renderBitLedger();
}

function renderBitLedger() {
  const sessions = S.get('bit_sessions') || [];
  const goals = S.get('goals') || [];

  // bits by goal
  const bitMap = {};
  sessions.filter(s => s.isBit).forEach(s => {
    bitMap[s.goalId] = (bitMap[s.goalId] || 0) + 1;
  });
  const maxBits = Math.max(1, ...Object.values(bitMap));
  const ledger = document.getElementById('bitLedgerContent');
  if (!Object.keys(bitMap).length) {
    ledger.innerHTML = '<div style="font-size:10px;color:var(--t2);padding:4px 0;line-height:1.5;">No bits yet.<br>Link sessions to goals to earn bits.</div>';
  } else {
    ledger.innerHTML = Object.entries(bitMap)
      .sort((a, b) => b[1] - a[1])
      .map(([gid, count]) => {
        const goal = goals.find(g => String(g.id) === String(gid));
        const name = goal ? goal.text.slice(0, 22) + (goal.text.length > 22 ? '…' : '') : 'Unknown';
        const pct = Math.round((count / maxBits) * 100);
        return `<div class="bit-goal-row">
          <div class="bit-goal-name" title="${escH(name)}">${escH(name)}</div>
          <div class="bit-bar-wrap"><div class="bit-bar" style="width:${pct}%"></div></div>
          <div class="bit-count">${count}</div>
        </div>`;
      }).join('');
  }

  // bug log
  const bugs = sessions.filter(s => !s.isBit).slice(-8).reverse();
  const bugLog = document.getElementById('bugLogContent');
  if (!bugs.length) {
    bugLog.innerHTML = '<div style="font-size:10px;color:var(--t2);padding:4px 0;">No bugs yet.</div>';
  } else {
    bugLog.innerHTML = bugs.map(b => {
      const d = new Date(b.ts);
      const timeStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
                      ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      return `<div class="bug-entry">
        <span class="bug-entry-desc">${escH(b.desc || '(no description)')}</span>
        <span class="bug-entry-time">${timeStr}</span>
      </div>`;
    }).join('');
  }
}

// ── SOUND ──
function getAC() { if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)(); return aCtx; }
function beep(f, d, v) {
  if (!tSound) return;
  try {
    const c = getAC(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value = f;
    g.gain.setValueAtTime(v || .2, c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, c.currentTime + d);
    o.start(c.currentTime); o.stop(c.currentTime + d);
  } catch(e) {}
}
function playDone() { [[523,0],[659,180],[784,360],[1047,600]].forEach(([f,t]) => setTimeout(() => beep(f, .5, .22), t)); }
function playBDone() { [[880,0],[660,200],[440,450]].forEach(([f,t]) => setTimeout(() => beep(f, .5, .18), t)); }

// ── TICK ──
function tTick() {
  tRem = Math.max(0, tTotal - Math.floor((Date.now() - tEpoch) / 1000));
  tRender();
  if (tRem === 0) {
    if (tMode === 'focus') {
      clearInterval(tInt); tRun = false; tMode = 'break-prompt';
      tSess++; tFocM += 30;
      S.set('t_sess', tSess); S.set('t_foc', tFocM);
      recordBitSession();
      playDone();
      if ('vibrate' in navigator) navigator.vibrate([200,100,200,100,400]);
      if (Notification.permission === 'granted') new Notification('30 min done', { body: 'Take a break?' });
      tShowPlay(); tRender();
    } else if (tMode === 'break') {
      clearInterval(tInt); tRun = false; playBDone();
      if ('vibrate' in navigator) navigator.vibrate([300,100,300]);
      setTimeout(() => { tMode = 'focus'; tTotal = FOCUS_T; tRem = FOCUS_T; tShowPlay(); tRender(); }, 1500);
    }
  } else {
    document.title = fmt(tRem) + ' · Wispora';
  }
}

function tShowPlay() {
  document.getElementById('tPlayI').style.display = '';
  document.getElementById('tPauseI').style.display = 'none';
}
function tShowPause() {
  document.getElementById('tPlayI').style.display = 'none';
  document.getElementById('tPauseI').style.display = '';
}

function tActuallyStart() {
  if (tMode === 'break-prompt') { tMode = 'break'; tTotal = BREAK_T; tRem = BREAK_T; }
  if (tRem <= 0) { tReset(); return; }
  tEpoch = Date.now() - (tTotal - tRem) * 1000;
  tRun = true; isTimerRunning = true;
  tShowPause();
  tInt = setInterval(tTick, 250);
  beep(440, .12, .15);
  if (Notification && Notification.permission === 'default') Notification.requestPermission();
}

function tStart() {
  if (tMode === 'break-prompt') { tActuallyStart(); return; }
  if (tRem < tTotal && tRem > 0 && currentBitSession) { tActuallyStart(); return; }
  openBitModal();
}
function tPause() {
  clearInterval(tInt); tRun = false; isTimerRunning = false;
  tShowPlay(); beep(330, .1, .1); tRender();
}
function tReset() {
  clearInterval(tInt); tRun = false; isTimerRunning = false;
  tMode = 'focus'; tTotal = FOCUS_T; tRem = FOCUS_T;
  currentBitSession = null;
  document.getElementById('sessionPill').classList.remove('visible');
  tShowPlay(); document.title = 'Wispora'; tRender();
}

// ── BIT MODAL ──
let modalIsBit = true;

function openBitModal() {
  const goals = (S.get('goals') || []).filter(g => !g.done);
  const sel = document.getElementById('bitGoalSelect');
  sel.innerHTML = '<option value="">— Select a goal —</option>' +
    goals.map(g => `<option value="${g.id}">${escH(g.text.slice(0, 48) + (g.text.length > 48 ? '…' : ''))}</option>`).join('');
  document.getElementById('bitTaskDesc').value = '';
  setModalType(true);
  document.getElementById('bitModal').classList.add('open');
  setTimeout(() => document.getElementById('bitTaskDesc').focus(), 220);
}

function setModalType(isBit) {
  modalIsBit = isBit;
  document.getElementById('typeBit').classList.toggle('selected', isBit);
  document.getElementById('typeBug').classList.toggle('selected', !isBit);
  document.getElementById('typeBit').setAttribute('aria-checked', isBit);
  document.getElementById('typeBug').setAttribute('aria-checked', !isBit);
  document.getElementById('goalSelectGroup').style.display = isBit ? 'block' : 'none';
}

document.getElementById('typeBit').addEventListener('click', () => setModalType(true));
document.getElementById('typeBug').addEventListener('click', () => setModalType(false));
document.getElementById('typeBit').addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') setModalType(true); });
document.getElementById('typeBug').addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') setModalType(false); });
document.getElementById('bitModalClose').addEventListener('click', () => document.getElementById('bitModal').classList.remove('open'));
document.getElementById('bitModal').addEventListener('click', e => { if (e.target === document.getElementById('bitModal')) document.getElementById('bitModal').classList.remove('open'); });

document.getElementById('bitModalStart').addEventListener('click', () => {
  const desc = document.getElementById('bitTaskDesc').value.trim();
  if (!desc) { toast('Describe what you\'re working on'); return; }
  const goalId = modalIsBit ? document.getElementById('bitGoalSelect').value : '';
  const isBit = modalIsBit && !!goalId;

  currentBitSession = { desc, goalId, isBit, startTs: Date.now() };
  document.getElementById('bitModal').classList.remove('open');

  // update session pill
  const pill = document.getElementById('sessionPill');
  const dot = document.getElementById('pillDot');
  document.getElementById('pillDesc').textContent = (isBit ? '✦ ' : '⚐ ') + desc;
  dot.classList.toggle('bug', !isBit);
  pill.classList.add('visible');

  tActuallyStart();
});

function recordBitSession() {
  if (!currentBitSession) return;
  const sessions = S.get('bit_sessions') || [];
  sessions.push({ ...currentBitSession, ts: Date.now() });
  S.set('bit_sessions', sessions);
  const isBit = currentBitSession.isBit;
  currentBitSession = null;
  document.getElementById('sessionPill').classList.remove('visible');
  toast(isBit ? '✦ Bit earned!' : '⚐ Bug logged');
}

// ── COLLAPSE TOGGLES ──
document.getElementById('ledgerHdr').addEventListener('click', () => {
  document.getElementById('ledgerBody').classList.toggle('open');
  document.getElementById('ledgerChev').classList.toggle('open');
});
document.getElementById('bugHdr').addEventListener('click', () => {
  document.getElementById('bugBody').classList.toggle('open');
  document.getElementById('bugChev').classList.toggle('open');
});

// sound toggle
document.getElementById('timerSound').addEventListener('click', () => {
  tSound = !tSound;
  document.getElementById('sndOn').style.display = tSound ? '' : 'none';
  document.getElementById('sndOff').style.display = tSound ? 'none' : '';
});

// play/pause
document.getElementById('timerPlay').addEventListener('click', () => { if (tRun) tPause(); else tStart(); });
document.getElementById('timerRingWrap').addEventListener('click', e => {
  if (!e.target.closest('#timerPlay')) { if (tRun) tPause(); else tStart(); }
});
document.getElementById('timerReset').addEventListener('click', tReset);

// ── INIT ──
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();
initParticles(70);
animateParticles();
renderTicks();
tRender();
</script>
</body>
