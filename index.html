<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" id="themeColor" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="30" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>30</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --muted: #4a4845;
      --accent: #c8b89a;
      --ring: #3a3835;
      --danger: #c0503a;
    }

    :root.break {
      --bg: #f5f0e8;
      --fg: #2a2724;
      --muted: #9a9590;
      --accent: #7a9e8a;
      --ring: #d8d0c4;
    }

    html {
      transition: background 0.8s ease;
      background: var(--bg);
    }

    html, body {
      height: 100%;
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      transition: background 0.8s ease, color 0.8s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    .ring-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      cursor: pointer;
    }

    .ring-wrap svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .ring-track {
      fill: none;
      stroke: var(--ring);
      stroke-width: 3;
      transition: stroke 0.8s ease;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.8s ease;
    }

    .ring-progress.urgent { stroke: var(--danger); }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time-display {
      font-family: 'Courier New', monospace;
      font-size: 56px;
      font-weight: 300;
      letter-spacing: -2px;
      color: var(--fg);
      line-height: 1;
      transition: color 0.4s ease;
    }

    .time-display.urgent { color: var(--danger); }

    .state-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.8s ease;
    }

    .mode-badge {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.6s ease, color 0.8s ease;
      margin-top: 2px;
    }

    .mode-badge.visible { opacity: 1; }

    .controls {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: opacity 0.2s, transform 0.15s, color 0.8s ease;
      color: var(--fg);
    }

    .btn:hover { opacity: 0.6; }
    .btn:active { transform: scale(0.92); }

    .btn-primary {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1.5px solid var(--ring) !important;
      background: none;
      transition: border-color 0.8s ease, color 0.8s ease, opacity 0.2s, transform 0.15s;
    }

    .btn-secondary {
      width: 40px;
      height: 40px;
      color: var(--muted);
      transition: color 0.8s ease, opacity 0.2s, transform 0.15s;
    }

    .btn-secondary:hover { color: var(--fg); opacity: 1; }

    .break-prompt {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.5s ease 0.4s, color 0.8s ease;
      pointer-events: none;
    }

    .break-prompt.visible { opacity: 1; }

    .done-flash {
      position: fixed;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.15s ease;
    }

    .done-flash.flash { opacity: 0.12; }
  </style>
</head>
<body>
  <div class="done-flash" id="flash"></div>

  <div class="container">
    <div style="position:relative">
      <div class="ring-wrap" id="ringWrap">
        <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="140" cy="140" r="126" />
          <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="126"
            stroke-dasharray="791.7" stroke-dashoffset="0" />
        </svg>
        <div class="ring-center">
          <div class="time-display" id="timeDisplay">30:00</div>
          <div class="state-label" id="stateLabel">ready</div>
          <div class="mode-badge" id="modeBadge">break</div>
        </div>
      </div>
      <div class="break-prompt" id="breakPrompt">press play for a 5 min break</div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" id="resetBtn" aria-label="Reset">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-4.14"></path>
        </svg>
      </button>

      <button class="btn btn-primary" id="playBtn" aria-label="Start">
        <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"></polygon>
        </svg>
        <svg id="pauseIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16" rx="1"></rect>
          <rect x="14" y="4" width="4" height="16" rx="1"></rect>
        </svg>
      </button>

      <button class="btn btn-secondary" id="soundBtn" aria-label="Sound on">
        <svg id="soundOnIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <svg id="soundOffIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const FOCUS_TOTAL = 30 * 60;
    const BREAK_TOTAL = 5 * 60;
    const CIRC = 2 * Math.PI * 126;

    let mode = 'focus'; // 'focus' | 'break-prompt' | 'break'
    let total = FOCUS_TOTAL;
    let remaining = FOCUS_TOTAL;
    let running = false;
    let soundOn = true;
    let interval = null;
    let audioCtx = null;
    let startEpoch = null;

    const timeDisplay = document.getElementById('timeDisplay');
    const stateLabel = document.getElementById('stateLabel');
    const modeBadge = document.getElementById('modeBadge');
    const ringProgress = document.getElementById('ringProgress');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const resetBtn = document.getElementById('resetBtn');
    const soundBtn = document.getElementById('soundBtn');
    const soundOnIcon = document.getElementById('soundOnIcon');
    const soundOffIcon = document.getElementById('soundOffIcon');
    const flash = document.getElementById('flash');
    const ringWrap = document.getElementById('ringWrap');
    const breakPrompt = document.getElementById('breakPrompt');

    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
    }

    function updateRing(rem) {
      const offset = CIRC * (1 - rem / total);
      ringProgress.style.strokeDashoffset = offset;
      const urgent = rem <= 60 && rem > 0;
      ringProgress.classList.toggle('urgent', urgent);
      timeDisplay.classList.toggle('urgent', urgent);
    }

    function setTheme(isBreak) {
      document.documentElement.classList.toggle('break', isBreak);
      modeBadge.classList.toggle('visible', isBreak);
    }

    function render() {
      timeDisplay.textContent = fmt(remaining);
      updateRing(remaining);
      breakPrompt.classList.toggle('visible', mode === 'break-prompt');

      if (mode === 'break-prompt') {
        stateLabel.textContent = 'done';
      } else if (remaining <= 0) {
        stateLabel.textContent = 'done';
      } else if (running) {
        stateLabel.textContent = mode === 'break' ? 'break' : 'focus';
      } else if (remaining === total) {
        stateLabel.textContent = 'ready';
      } else {
        stateLabel.textContent = 'paused';
      }
    }

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function beep(freq, dur, vol) {
      if (!soundOn) return;
      try {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol || 0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + dur);
      } catch(e) {}
    }

    function playFocusDone() {
      [[523,0],[659,180],[784,360],[1047,600]].forEach(([f,t]) => {
        setTimeout(() => beep(f, 0.5, 0.25), t);
      });
    }

    function playBreakDone() {
      [[880,0],[660,200],[440,450]].forEach(([f,t]) => {
        setTimeout(() => beep(f, 0.5, 0.2), t);
      });
    }

    function doFlash() {
      flash.classList.add('flash');
      setTimeout(() => flash.classList.remove('flash'), 300);
    }

    function showPlay() { playIcon.style.display = ''; pauseIcon.style.display = 'none'; }
    function showPause() { playIcon.style.display = 'none'; pauseIcon.style.display = ''; }

    function onFocusDone() {
      clearInterval(interval);
      running = false;
      mode = 'break-prompt';
      showPlay();
      playFocusDone();
      doFlash();
      if ('vibrate' in navigator) navigator.vibrate([200,100,200,100,400]);
      document.title = '✓ break?';
      if (Notification.permission === 'granted')
        new Notification('30 minutes done', { body: 'Take a 5 min break?' });
      render();
    }

    function onBreakDone() {
      clearInterval(interval);
      running = false;
      showPlay();
      playBreakDone();
      doFlash();
      if ('vibrate' in navigator) navigator.vibrate([300,100,300]);
      document.title = '✓ back to work';
      if (Notification.permission === 'granted')
        new Notification('Break over', { body: 'Back to focus.' });
      setTimeout(() => {
        mode = 'focus';
        total = FOCUS_TOTAL;
        remaining = FOCUS_TOTAL;
        setTheme(false);
        document.title = '30';
        render();
      }, 1500);
    }

    function tick() {
      const elapsed = Math.floor((Date.now() - startEpoch) / 1000);
      remaining = Math.max(0, total - elapsed);
      render();
      if (remaining === 0) {
        if (mode === 'focus') onFocusDone();
        else if (mode === 'break') onBreakDone();
      } else {
        document.title = fmt(remaining);
      }
    }

    function start() {
      if (mode === 'break-prompt') {
        mode = 'break';
        total = BREAK_TOTAL;
        remaining = BREAK_TOTAL;
        setTheme(true);
      }
      if (remaining <= 0) { hardReset(); return; }
      startEpoch = Date.now() - (total - remaining) * 1000;
      running = true;
      showPause();
      interval = setInterval(tick, 250);
      beep(440, 0.12, 0.15);
      if (Notification && Notification.permission === 'default') Notification.requestPermission();
    }

    function pause() {
      clearInterval(interval);
      running = false;
      showPlay();
      beep(330, 0.1, 0.1);
      render();
    }

    function hardReset() {
      clearInterval(interval);
      running = false;
      mode = 'focus';
      total = FOCUS_TOTAL;
      remaining = FOCUS_TOTAL;
      setTheme(false);
      showPlay();
      document.title = '30';
      render();
    }

    playBtn.addEventListener('click', () => { if (running) pause(); else start(); });
    ringWrap.addEventListener('click', (e) => { if (!e.target.closest('#playBtn')) { if (running) pause(); else start(); } });
    resetBtn.addEventListener('click', hardReset);

    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      soundOnIcon.style.display = soundOn ? '' : 'none';
      soundOffIcon.style.display = soundOn ? 'none' : '';
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); if (running) pause(); else start(); }
      if (e.code === 'KeyR') hardReset();
      if (e.code === 'KeyM') soundBtn.click();
    });

    async function requestWakeLock() {
      try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && running) requestWakeLock();
    });

    render();

    if ('serviceWorker' in navigator)
      window.addEventListener('load', () => navigator.serviceWorker.register('/focus_app/sw.js', { scope: '/focus/app' }));
  </script>
</body>
</html>
